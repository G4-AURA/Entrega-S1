{% extends 'base.html' %}
{% load static %}

{% block title %}Error - AURA{% endblock %}

{% block extra_css %}
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
    .error-container {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
</style>
{% endblock %}

{% block content %}
<div class="error-container">
    <div class="text-center" style="max-width: 500px;">
        <div class="mb-4">
            <div class="rounded-circle d-inline-flex align-items-center justify-content-center mb-3" 
                 style="width: 100px; height: 100px; background-color: #FEE2E2; color: #DC2626;">
                <span class="material-icons-round" style="font-size:56px">error_outline</span>
            </div>
        </div>
        
        <h2 class="fw-bold mb-3">¡Ups! Algo salió mal</h2>
        <p class="text-muted fs-5 mb-4">{{ error }}</p>
        
        <div class="d-flex flex-column gap-2">
            <a href="/" class="btn btn-brand btn-lg rounded-pill fw-bold shadow-sm px-5">
                Volver al Inicio
            </a>
            <p class="text-muted small mt-3">
                Si crees que esto es un error, contacta a tu guía turístico.
            </p>
        </div>
    </div>
</div>
{% endblock %}
