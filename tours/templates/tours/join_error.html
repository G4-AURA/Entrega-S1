{% extends 'base.html' %}
{% load static %}

{% block title %}Error - AURA{% endblock %}

{% block content %}
<div style="min-height:calc(100vh - 68px);display:flex;align-items:center;justify-content:center;padding:2rem 1rem;">
    <div class="text-center" style="max-width:440px;">

        <div class="d-inline-flex align-items-center justify-content-center mb-4"
             style="width:88px;height:88px;background:var(--danger-light);border-radius:24px;color:var(--danger);">
            <span class="material-icons-round" style="font-size:48px;">error_outline</span>
        </div>

        <h2 style="font-family:'Manrope',sans-serif;font-size:1.625rem;font-weight:800;letter-spacing:-.04em;margin-bottom:.75rem;">
            ¡Ups! Algo salió mal
        </h2>
        <p style="color:var(--text-muted);font-size:1rem;line-height:1.6;margin-bottom:2rem;">
            {{ error }}
        </p>

        <a href="/" class="btn btn-brand btn-lg fw-bold px-5" style="border-radius:var(--radius);">
            Volver al inicio
        </a>

        <p style="color:var(--text-muted);font-size:.8rem;margin-top:1.5rem;margin-bottom:0;">
            Si crees que esto es un error, contacta a tu guía turístico.
        </p>

    </div>
</div>
{% endblock %}
