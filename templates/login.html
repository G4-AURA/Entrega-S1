{% extends 'base.html' %}
{% load static %}

{% block title %}Iniciar Sesión - AURA{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold" style="color: var(--brand-color);">🔐 Iniciar Sesión</h2>
                        <p class="text-muted">Accede a tu cuenta de AURA</p>
                    </div>
                    
                    {% if form.errors %}
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        <strong>Error:</strong> Usuario o contraseña incorrectos.
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    {% endif %}
                    
                    <form method="post" action="{% url 'login' %}">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="username" class="form-label fw-bold">Usuario</label>
                            <input 
                                type="text" 
                                name="username" 
                                class="form-control form-control-lg" 
                                id="username" 
                                placeholder="Ingresa tu usuario"
                                required 
                                autofocus
                            >
                        </div>
                        
                        <div class="mb-4">
                            <label for="password" class="form-label fw-bold">Contraseña</label>
                            <input 
                                type="password" 
                                name="password" 
                                class="form-control form-control-lg" 
                                id="password" 
                                placeholder="Ingresa tu contraseña"
                                required
                            >
                        </div>
                        
                        <input type="hidden" name="next" value="{{ next }}">
                        
                        <button type="submit" class="btn btn-brand w-100 py-3 mb-3 fw-bold">
                            Iniciar Sesión
                        </button>
                    </form>
                    
                    <div class="text-center">
                        <a href="/" class="text-decoration-none text-muted">
                            <small>← Volver al inicio</small>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
