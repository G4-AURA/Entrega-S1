<!-- Base template para la aplicación AURA. Este archivo define la estructura HTML común 
a todas las páginas, incluyendo la barra de navegación, los enlaces a Bootstrap y Leaflet, 
y bloques para contenido específico de cada página. Este template es solo de de referencia 
y puede ser modificado según las necesidades del proyecto. Las páginas específicas 
(como mapa.html) extenderán este template y llenarán los bloques definidos aquí. */
-->
{% load static %} <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AURA - Copiloto para Guías{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    {% block extra_css %}{% endblock %}
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container d-flex justify-content-between align-items-center">
            
            <a class="navbar-brand fw-bold" style="letter-spacing: 1px;" href="/">AURA</a>
            
            <a href="#" class="text-decoration-none" title="Ir a mi perfil">
                
                {% if user.is_authenticated %}
                    <div class="rounded-circle d-flex align-items-center justify-content-center text-white fw-bold shadow-sm" 
                         style="width: 42px; height: 42px; background-color: #4F46E5; border: 2px solid #4B5563;">
                        {{ user.username|make_list|first|upper }}
                    </div>
                {% else %}
                    <div class="rounded-circle d-flex align-items-center justify-content-center text-secondary shadow-sm" 
                         style="width: 42px; height: 42px; background-color: #374151; border: 2px solid #4B5563;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-person-fill" viewBox="0 0 16 16">
                            <path d="M3 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1H3Zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/>
                        </svg>
                    </div>
                {% endif %}
                
            </a>
            
        </div>
    </nav>

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    {% block extra_js %}{% endblock %}
</body>
</html>
