<!-- Base template para la aplicación AURA. Este archivo define la estructura HTML común 
a todas las páginas, incluyendo la barra de navegación, los enlaces a Bootstrap y Leaflet, 
y bloques para contenido específico de cada página. Este template es solo de de referencia 
y puede ser modificado según las necesidades del proyecto. Las páginas específicas 
(como mapa.html) extenderán este template y llenarán los bloques definidos aquí. */
-->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AURA - Copiloto para Guías{% endblock %}</title>

    <!-- Enlaces a CSS de Bootstrap y Leaflet para estilos y mapas interactivos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    <style>
        /* Un mapa debe tener una altura definida para que Leaflet pueda renderizarlo */
        .map-container {
            height: 600px;
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">AURA</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" href="{% url 'home' %}">Mapa Principal</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'creacion:seleccion_tipo_ruta' %}">Crear Ruta</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    {% block extra_js %}{% endblock %}
</body>
</html>
