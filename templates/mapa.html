{% extends 'base.html' %}
{% load static %}

{% block title %}AURA - Mapa de Rutas{% endblock %}

{% block extra_css %}
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h2 class="mb-3">Mapa Interactivo con Mapbox</h2>
        <p class="text-muted">Vista del guía turístico para Puntos de Interés (POIs).</p>
        
        <div id="mi-mapa" class="map-container"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // Tu Token de Mapbox (Idealmente inyectado desde Django context, aquí puesto directo para la prueba)
    const mapboxToken = '{{ MAPBOX_ACCESS_TOKEN }}';

    // 1. Inicializar el mapa
    var map = L.map('mi-mapa').setView([37.3891, -5.9845], 13);

    // 2. Añadir la capa de Mapbox usando la API de Static Tiles
    // Puedes cambiar 'streets-v12' por 'light-v11', 'dark-v11', 'outdoors-v12' o tu propio estilo personalizado
    L.tileLayer('https://api.mapbox.com/styles/v1/mapbox/streets-v12/tiles/256/{z}/{x}/{y}@2x?access_token=' + mapboxToken, {
        maxZoom: 19,
        attribution: '© <a href="https://www.mapbox.com/about/maps/">Mapbox</a> © <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);

    // 3. Añadir marcadores
    var marker = L.marker([37.3891, -5.9845]).addTo(map);
    marker.bindPopup("<b>¡Hola Guía!</b><br>Este es el punto de encuentro.").openPopup();
</script>
{% endblock %}
